<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMAZON Deals</title>

<style>

/* ---------- RESET ---------- */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

/* ---------- BODY (MOBILE FIRST) ---------- */
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;

background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.65)),
url("https://images.unsplash.com/photo-1501785888041-af3ef285b470")
center/cover no-repeat;

color:white;
}

/* ---------- GLASS CARD ---------- */
.container{
width:100%;
max-width:420px;
padding:35px 25px;

border-radius:26px;
text-align:center;

background:rgba(255,255,255,0.14);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.25);
box-shadow:0 20px 50px rgba(0,0,0,.45);
}

/* ---------- HEADER ---------- */
h1{
font-size:28px;
font-weight:600;
letter-spacing:-0.5px;
margin-bottom:8px;
}

p{
font-size:15px;
opacity:.85;
margin-bottom:28px;
line-height:1.4;
}

/* ---------- BUTTONS ---------- */
.link-btn{
display:block;
text-decoration:none;
color:white;

padding:16px;
margin:10px 0;

border-radius:18px;
background:rgba(255,255,255,.20);

font-weight:500;
font-size:16px;

transition:.25s;
}

/* tap animation (mobile friendly) */
.link-btn:active{
transform:scale(.96);
background:white;
color:black;
}

/* hover for desktop */
@media(hover:hover){
.link-btn:hover{
transform:translateY(-3px);
background:white;
color:black;
}
}

/* ---------- FOOTER ---------- */
.footer{
margin-top:18px;
font-size:12px;
opacity:.65;
line-height:1.4;
}

/* ---------- BIG SCREEN IMPROVEMENT ---------- */
@media(min-width:768px){

body{
padding:40px;
}

.container{
padding:50px 45px;
}

h1{
font-size:36px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>AMAZON DEALS</h1>

</div>

</div>

</body>
</html>
